<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROI Dashboard — Gás do Povo</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Nunito:wght@400;600;700;800&display=swap');
:root{--dark:#0f172a;--card:#1e293b;--border:#334155;--text:#e2e8f0;--muted:#94a3b8;--green:#16a34a;--red:#dc2626;--yellow:#eab308;--blue:#2563eb}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--dark);color:var(--text);font-family:'Nunito',sans-serif;padding:20px 16px;min-height:100vh}
.mono{font-family:'JetBrains Mono',monospace}
.card{background:var(--card);border-radius:12px;padding:20px;border:1px solid var(--border);margin-bottom:16px}
.card h3{margin:0 0 14px;font-size:14px;font-weight:700}
.kpis{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px}
.kpi{background:var(--card);border-radius:10px;padding:14px 18px;border:1px solid var(--border);flex:1 1 140px;min-width:140px}
.kpi-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-family:'JetBrains Mono',monospace}
.kpi-value{font-size:22px;font-weight:800;font-family:'JetBrains Mono',monospace;margin-top:4px}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:2px}
.tabs{display:flex;gap:3px;margin-bottom:20px;background:var(--card);border-radius:10px;padding:3px;flex-wrap:wrap;width:fit-content}
.tab{padding:9px 14px;border-radius:7px;border:none;cursor:pointer;font-size:11px;font-weight:700;font-family:'Nunito',sans-serif;background:transparent;color:var(--muted);transition:all .2s}
.tab.active{background:var(--yellow);color:var(--dark)}
.badge{padding:2px 8px;border-radius:5px;font-size:12px;font-weight:700;font-family:'JetBrains Mono',monospace;white-space:nowrap}
.badge-pos{background:rgba(22,163,74,.15);color:var(--green)}
.badge-neg{background:rgba(220,38,38,.15);color:var(--red)}
table{width:100%;border-collapse:collapse}
th{padding:10px 12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);border-bottom:2px solid var(--border);white-space:nowrap;font-family:'JetBrains Mono',monospace;cursor:pointer;user-select:none;position:sticky;top:0;background:var(--card);z-index:1}
th.sorted{color:var(--yellow)}th.left{text-align:left}
td{padding:9px 12px;font-size:12px;border-bottom:1px solid var(--border)}
td.mono{font-family:'JetBrains Mono',monospace}td.right{text-align:right}
tr.pr{background:rgba(22,163,74,.04)}
.dot{display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:5px}
select{padding:7px 12px;border-radius:7px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:12px;font-family:'Nunito',sans-serif;cursor:pointer}
.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.scroll{overflow-x:auto;max-height:500px;overflow-y:auto}
.import-zone{border:2px dashed var(--border);border-radius:12px;padding:30px;text-align:center;margin:12px 0;transition:all .3s;cursor:pointer}
.import-zone:hover,.import-zone.drag{border-color:var(--yellow);background:rgba(234,179,8,.05)}
.import-zone input[type=file]{display:none}
.btn{padding:10px 20px;border-radius:8px;border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .2s}
.btn-yellow{background:var(--yellow);color:var(--dark)}.btn-green{background:var(--green);color:#fff}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted)}
.btn-red{background:transparent;border:1px solid var(--red);color:var(--red)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:768px){.grid-2{grid-template-columns:1fr}.kpis{flex-direction:column}}
</style>
</head>

function parseGamExcel(wb){const rows=[];wb.SheetNames.forEach(n=>{const num=n.replace(/[^0-9]/g,'');if(!num)return;const c='Campanha '+num;const s=XLSX.utils.sheet_to_json(wb.Sheets[n],{defval:''});s.forEach(r=>{const d={};Object.keys(r).forEach(k=>{if(k!=null)d[String(k).trim()]=r[k]});const date=parseDate(d['Data']);if(!date||date.length<8)return;const u=d['Chaves-valor']||'';const p=getGamP(u);if(!p)return;const rev=parseBRL(d['Receita total de CPM e de CPC']||d['Receita']||0);if(rev>0)rows.push({c,d:date,p,ms:0,mc:0,mi:0,gr:+rev.toFixed(4)})})});return rows}
function parseHourlyExcel(wb){const rows=[];wb.SheetNames.forEach(n=>{if(n==='Resumo Geral'||n==='Resumo por Dia')return;const m=n.match(/CAMPANHA(\d+)/i);if(!m)return;const c='Campanha '+m[1];const s=wb.Sheets[n];const data=XLSX.utils.sheet_to_json(s,{header:1,defval:''});let curDate=null;data.forEach(row=>{const cell=String(row[0]||'');const dm=cell.match(/(\d{2})\/(\d{2})\/(\d{4})/);if(dm){curDate=`${dm[3]}-${dm[2]}-${dm[1]}`;return}if(!curDate||cell==='Hora')return;const hm=cell.match(/^(\d{2})h$/);if(!hm)return;const h=parseInt(hm[1]);const sp=parseFloat(row[1])||0;const rv=parseFloat(row[2])||0;if(sp>0||rv>0)rows.push({c,d:curDate,h,s:+sp.toFixed(4),r:+rv.toFixed(4)})})});return rows}

function mergeData(existing,newMeta,newGam){const map={};const key=r=>r.c+'|||'+r.d+'|||'+r.p;existing.forEach(r=>{const k=key(r);if(!map[k])map[k]={c:r.c,d:r.d,p:r.p,ms:0,mc:0,mi:0,gr:0};map[k].ms+=r.ms;map[k].mc+=(r.mc||0);map[k].mi+=(r.mi||0);map[k].gr+=r.gr});newMeta.forEach(r=>{const k=key(r);if(!map[k])map[k]={c:r.c,d:r.d,p:r.p,ms:0,mc:0,mi:0,gr:0};map[k].ms+=r.ms;map[k].mc+=(r.mc||0);map[k].mi+=(r.mi||0)});newGam.forEach(r=>{const k=key(r);if(!map[k])map[k]={c:r.c,d:r.d,p:r.p,ms:0,mc:0,mi:0,gr:0};map[k].gr+=r.gr});return Object.values(map).filter(r=>r.ms>0||r.gr>0)}

// Data processing
function processPlacement(raw){
  const daily=raw.map(r=>({...r,profit:+(r.gr-r.ms).toFixed(4),roas:r.ms>0?+(r.gr/r.ms).toFixed(2):r.gr>0?999:0}));
  const cpMap={};daily.forEach(r=>{const k=r.c+'|||'+r.p;if(!cpMap[k])cpMap[k]={c:r.c,p:r.p,ms:0,mc:0,mi:0,gr:0};cpMap[k].ms+=r.ms;cpMap[k].mc+=(r.mc||0);cpMap[k].mi+=(r.mi||0);cpMap[k].gr+=r.gr});
  const campPlace=Object.values(cpMap).map(r=>({...r,ms:+r.ms.toFixed(2),gr:+r.gr.toFixed(2),profit:+(r.gr-r.ms).toFixed(2),roas:r.ms>0?+(r.gr/r.ms).toFixed(2):0}));
  const ctMap={};daily.forEach(r=>{if(!ctMap[r.c])ctMap[r.c]={c:r.c,ms:0,mc:0,gr:0};ctMap[r.c].ms+=r.ms;ctMap[r.c].mc+=(r.mc||0);ctMap[r.c].gr+=r.gr});
  const campTotal=Object.values(ctMap).map(r=>({...r,ms:+r.ms.toFixed(2),gr:+r.gr.toFixed(2),profit:+(r.gr-r.ms).toFixed(2),roi:r.ms>0?+((r.gr-r.ms)/r.ms*100).toFixed(1):0,roas:r.ms>0?+(r.gr/r.ms).toFixed(2):0})).sort((a,b)=>a.c.localeCompare(b.c,undefined,{numeric:true}));
  return{daily,campPlace,campTotal,campaigns:[...new Set(daily.map(r=>r.c))].sort((a,b)=>a.localeCompare(b,undefined,{numeric:true})),dates:[...new Set(daily.map(r=>r.d))].sort()};
}

    <div class="card"><h3>📊 Status</h3><div style="font-size:12px;color:var(--muted)">Placement: ${rawData.length} registros · Hourly: ${hourlyData.length} registros · ${d.campaigns.length} campanhas · Ativas: ${ACTIVE.map(c=>c.replace('Campanha ','')).join(', ')}</div></div>`;
  }

  document.getElementById('app').innerHTML=html;
}

// Event handlers
function S(k,v){st[k]=v;render()}
function DS(f){if(st.sf===f)st.sdr*=-1;else{st.sf=f;st.sdr=-1}render()}
function TM(m){st.mx[m]=!st.mx[m];render()}

function readXL(file,cb){const r=new FileReader();r.onload=e=>{cb(XLSX.read(e.target.result,{type:'array'}))};r.readAsArrayBuffer(file)}
function HD(e,t){e.preventDefault();e.target.closest('.import-zone').classList.remove('drag');const f=e.dataTransfer.files[0];if(f)PF(f,t)}
function HF(e,t){const f=e.target.files[0];if(f)PF(f,t)}
function PF(file,type){
  const el=document.getElementById('s-'+type);
  readXL(file,wb=>{
    try{
      if(type==='meta'){const rows=parseMetaExcel(wb);rawData=mergeData(rawData,[],[]); rawData=mergeData(INIT_RAW,rows,[]);
        // Re-merge with existing GAM
        const gamRows=INIT_RAW.filter(r=>r.gr>0&&r.ms===0);rawData=mergeData(rawData,[],[]); 
        el.innerHTML=`<div style="padding:8px;background:rgba(22,163,74,.1);border-radius:6px;font-size:11px;color:var(--green);margin-top:6px">✅ ${rows.length} registros (${wb.SheetNames.join(', ')})</div>`}
      else if(type==='gam'){const rows=parseGamExcel(wb);rawData=mergeData(rawData,[],rows);
        el.innerHTML=`<div style="padding:8px;background:rgba(22,163,74,.1);border-radius:6px;font-size:11px;color:var(--green);margin-top:6px">✅ ${rows.length} registros (${wb.SheetNames.join(', ')})</div>`}
      else if(type==='hourly'){const rows=parseHourlyExcel(wb);hourlyData=rows;
        el.innerHTML=`<div style="padding:8px;background:rgba(22,163,74,.1);border-radius:6px;font-size:11px;color:var(--green);margin-top:6px">✅ ${rows.length} registros (${wb.SheetNames.filter(s=>s!=='Resumo Geral'&&s!=='Resumo por Dia').length} campanhas)</div>`}
      st.sc='all';st.sd='all';st.tab=0;render();
    }catch(err){el.innerHTML=`<div style="padding:8px;background:rgba(220,38,38,.1);border-radius:6px;font-size:11px;color:var(--red);margin-top:6px">❌ ${err.message}</div>`}
  });
}
function resetAll(){rawData=[...INIT_RAW];hourlyData=[...INIT_HOURLY];st.tab=0;st.sc='all';st.sd='all';render()}

  txt+=`   Receita Total:  $${parseFloat(rev).toFixed(2)}\n`;
  txt+=`   Lucro:          $${parseFloat(profit).toFixed(2)}\n`;

  txt+=`${'─'.repeat(45)}\n\n`;
  
  txt+=`✅ INCLUIR NA CAMPANHA (${incluir.length})\n\n`;

  });
  
  txt+=`${'─'.repeat(45)}\n\n`;

    txt+=`   • ${r.p}\n`;
    txt+=`      ROAS: ${r.roas}x | Lucro: $${r.profit.toFixed(2)} | Gasto: $${r.spend.toFixed(2)} (${r.pctBudget}%)\n\n`;
  });
  
  txt+=`${'─'.repeat(45)}\n\n`;
  
  txt+=`❌ NÃO SELECIONAR (${excluir.length})\n\n`;

  document.getElementById('report-title').textContent='📍 Relatório por Placement';

function generateHourlyReport(onlyActive){
  const today=new Date().toLocaleDateString('pt-BR');
  const scope=onlyActive?'Campanhas Ativas':'Todas as Campanhas';
  
  // Process hourly data
  const activeCamps=ACTIVE;
  let hF=hourlyData;
  if(onlyActive) hF=hF.filter(r=>activeCamps.includes(r.c));
  
  const byH={};for(let h=0;h<24;h++)byH[h]={s:0,r:0};
  hF.forEach(r=>{byH[r.h].s+=r.s;byH[r.h].r+=r.r});
  
  const hours=[];
  for(let h=0;h<24;h++){
    const s=byH[h].s,r=byH[h].r;
    if(s>0||r>0) hours.push({h,s:+s.toFixed(2),r:+r.toFixed(2),p:+(r-s).toFixed(2),roas:s>0?+(r/s).toFixed(2):r>0?999:0});
  }
  
  const totalS=hours.reduce((a,r)=>a+r.s,0);
  const totalR=hours.reduce((a,r)=>a+r.r,0);
  const totalP=totalR-totalS;
  
  const profitable=hours.filter(r=>r.p>0).sort((a,b)=>b.p-a.p);
  const losing=hours.filter(r=>r.p<0).sort((a,b)=>a.p-b.p);
  const bestRoas=hours.filter(r=>r.s>0.5).sort((a,b)=>b.roas-a.roas);
  
  // Find best time windows
  const windows=[];
  let winStart=null,winProfit=0;
  for(let h=0;h<24;h++){
    const hr=hours.find(r=>r.h===h);
    if(hr&&hr.p>0){
      if(winStart===null)winStart=h;
      winProfit+=hr.p;
    }else{
      if(winStart!==null){windows.push({start:winStart,end:h-1,profit:+winProfit.toFixed(2)});winStart=null;winProfit=0}
    }
  }
  if(winStart!==null)windows.push({start:winStart,end:23,profit:+winProfit.toFixed(2)});
  windows.sort((a,b)=>b.profit-a.profit);
  
  let txt=`⏰ ANÁLISE ROI POR HORA — GÁS DO POVO\n`;
  txt+=`📅 ${today} | Base: ${scope}\n`;
  txt+=`${'─'.repeat(45)}\n\n`;
  
  txt+=`💰 RESUMO\n`;
  txt+=`   Gasto Total:   $${totalS.toFixed(2)}\n`;
  txt+=`   Receita Total:  $${totalR.toFixed(2)}\n`;
  txt+=`   Lucro:          $${totalP.toFixed(2)}\n`;
  txt+=`   ROAS Geral:     ${totalS>0?(totalR/totalS).toFixed(2):'0'}x\n\n`;
  
  txt+=`${'─'.repeat(45)}\n\n`;
  
  txt+=`🟢 HORÁRIOS LUCRATIVOS (${profitable.length})\n\n`;
  profitable.forEach((r,i)=>{
    const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':'  •';
    const label=String(r.h).padStart(2,'0')+'h';
    txt+=`   ${medal} ${label} — Lucro: $${r.p.toFixed(2)} | ROAS: ${r.roas}x | Gasto: $${r.s.toFixed(2)}\n`;
  });
  
  txt+=`\n${'─'.repeat(45)}\n\n`;
  
  txt+=`🔴 HORÁRIOS COM PREJUÍZO (${losing.length})\n\n`;
  losing.forEach(r=>{
    const label=String(r.h).padStart(2,'0')+'h';
    txt+=`   ✘ ${label} — Prejuízo: $${r.p.toFixed(2)} | ROAS: ${r.roas}x | Gasto: $${r.s.toFixed(2)}\n`;
  });
  
  txt+=`\n${'─'.repeat(45)}\n\n`;
  
  if(bestRoas.length>0){
    txt+=`📈 MELHOR ROAS POR HORA (top 5, mín $0.50 gasto)\n\n`;
    bestRoas.slice(0,5).forEach((r,i)=>{
      const label=String(r.h).padStart(2,'0')+'h';
      txt+=`   ${i+1}. ${label} — ROAS: ${r.roas}x | Receita: $${r.r.toFixed(2)} | Gasto: $${r.s.toFixed(2)}\n`;
    });
    txt+=`\n${'─'.repeat(45)}\n\n`;
  }
  
  if(windows.length>0){
    txt+=`🕐 JANELAS DE LUCRO (horários consecutivos)\n\n`;
    windows.forEach((w,i)=>{
      txt+=`   ${i+1}. ${String(w.start).padStart(2,'0')}h → ${String(w.end).padStart(2,'0')}h — Lucro acumulado: $${w.profit.toFixed(2)}\n`;
    });
    txt+=`\n${'─'.repeat(45)}\n\n`;
  }
  
  txt+=`🎯 RECOMENDAÇÃO DE PROGRAMAÇÃO\n\n`;
  if(windows.length>0){
    const best=windows[0];
    txt+=`   Concentrar budget entre ${String(best.start).padStart(2,'0')}h e ${String(best.end).padStart(2,'0')}h\n`;
    txt+=`   (janela com maior lucro acumulado: $${best.profit.toFixed(2)})\n\n`;
  }
  if(losing.length>0){
    txt+=`   Reduzir/pausar entre:\n`;
    losing.slice(0,3).forEach(r=>{
      txt+=`   ✘ ${String(r.h).padStart(2,'0')}h (prejuízo: $${r.p.toFixed(2)})\n`;
    });
  }
  
  txt+=`\n${'─'.repeat(45)}\n`;
  txt+=`Gerado pelo Dashboard ROI — Gás do Povo`;
  
  document.getElementById('report-title').textContent='⏰ Relatório por Hora';
  document.getElementById('report-text').textContent=txt;
  document.getElementById('report-modal').style.display='flex';
}

function copyReport(){
  const txt=document.getElementById('report-text').textContent;
  navigator.clipboard.writeText(txt).then(()=>{
    document.getElementById('copy-status').innerHTML='<span style="color:var(--green);font-size:12px">✅ Copiado!</span>';
    setTimeout(()=>{document.getElementById('copy-status').innerHTML=''},2000);
  }).catch(()=>{
    // Fallback
    const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
    document.getElementById('copy-status').innerHTML='<span style="color:var(--green);font-size:12px">✅ Copiado!</span>';
  });
}

function exportHTML(){
  // Get current page HTML as template
  const fullHTML=document.documentElement.outerHTML;
  
  // Build new data strings
  const newPlacement=JSON.stringify(rawData);
  const newHourly=JSON.stringify(hourlyData);
  const newActive=JSON.stringify(ACTIVE);
  
  // Replace the data constants in the HTML source
  // We need to work with the original source, not the rendered DOM
  let src=new XMLSerializer().serializeToString(document.doctype)+'\n'+document.documentElement.outerHTML;
  
  // Actually, better approach: fetch our own source and replace
  // Since we can't fetch file://, let's reconstruct from the current page
  const orig=document.querySelector('script:not([src])');
  if(!orig){alert('Erro ao exportar');return}
  
  let scriptContent=orig.textContent;
  
  // Replace INIT_RAW data
  scriptContent=scriptContent.replace(
    /const INIT_RAW = \[.*?\];/s,
    'const INIT_RAW = '+newPlacement+';'
  );
  
  // Replace INIT_HOURLY data  
  scriptContent=scriptContent.replace(
    /const INIT_HOURLY = \[.*?\];/s,
    'const INIT_HOURLY = '+newHourly+';'
  );
  
  // Replace ACTIVE campaigns
  scriptContent=scriptContent.replace(
    /let ACTIVE=\[.*?\];/,
    'let ACTIVE='+newActive+';'
  );
  
  // Build full HTML
  const styles=document.querySelector('style').textContent;
  const xlsxScript='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
  
  const newHTML=`<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROI Dashboard — Gás do Povo</title>
<script src="${xlsxScript}"><\/script>
<style>${styles}</style>
</head>
<body>
<div id="app">Carregando...</div>
<script>${scriptContent}<\/script>
</body>
</html>`;
  
  // Download
  const blob=new Blob([newHTML],{type:'text/html;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='index.html';
  a.click();
  URL.revokeObjectURL(url);
}
